<script type="text/babel">
const {useState,useEffect,useRef}=React;

const TD_KEY="e317ea9a7e334aada42f0f58d9b92365";

// CACHE — prevents repeated API requests within 10 minutes
const PRICE_CACHE={};
const CACHE_TTL=10*60*1000;
const getCached=(key)=>{const c=PRICE_CACHE[key];if(c&&Date.now()-c.ts<CACHE_TTL)return c.data;return null;};
const setCache=(key,data)=>{PRICE_CACHE[key]={data,ts:Date.now()};};

const C={bg:"#0C0A07",bg1:"#111009",bg2:"#1C1610",bg3:"#231A0E",gold:"#C8A060",goldL:"#DDB87A",goldP:"#EDD9A8",cream:"#F0E6CC",green:"#4CAF7D",red:"#C0392B",blue:"#5B8FD4",gray:"#7A6E5E",grayL:"#A09080",border:"rgba(200,160,96,0.18)",borderHi:"rgba(200,160,96,0.40)"};
const LR={xau:0.90,large:0.65,mid:0.35,small:0.35,cash:1.00,negative:0.00,bond:0.85,structured:0.55,realestate:0.60};
const FX=1.16985;
const BANKS=["Moncrief Bank","UBS","Pictet","CFM Indosuez","BNP Paribas","Interactive Brokers","Saxo Bank","Swissquote","Other"];
const CURS=["EUR","USD","CHF","GBP","JPY"];
const CAP_OPTS=[{v:"large",l:"Equity >$1B → 65%"},{v:"mid",l:"Equity $500M–$1B → 35%"},{v:"small",l:"Equity <$500M → 35%"},{v:"xau",l:"Gold / XAU → 90%"},{v:"bond",l:"Bond → 85%"},{v:"structured",l:"Structured → 55%"},{v:"realestate",l:"Real Estate → 60%"},{v:"cash",l:"Cash → 100%"},{v:"negative",l:"Debit → 0%"}];
const CAT_L={large:"Equity>1B",mid:"Equity 500M+",small:"Equity<500M",xau:"Gold",bond:"Bond",structured:"Structured",realestate:"Real Estate",cash:"Cash",negative:"Debit"};

// ===== Velvet Concierge assistants =====
const ASSISTANTS={
  kate:{
    name:"Kate",
    tagline:"Your personal concierge",
    persona:"Tu es Kate — l'assistante personnelle chaleureuse du service Velvet Concierge de Monaco Finance International. Ton style est chaleureux, attentionné, élégant et rassurant, tout en restant précis et professionnel.",
    accent:"#DDB87A"
  },
  max:{
    name:"Max",
    tagline:"Your personal concierge",
    persona:"Tu es Max — l'assistant personnel efficace du service Velvet Concierge de Monaco Finance International. Ton style est posé, direct, professionnel et orienté résultats, tout en restant courtois.",
    accent:"#C8A060"
  }
};

// SVG avatar: Kate (feminine silhouette) / Max (masculine silhouette), gold tones
function Avatar({who,size=64}){
  const a=ASSISTANTS[who];
  const grad=who==="kate"?["#DDB87A","#C8A060"]:["#C8A060","#A9823F"];
  return(
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{display:"block"}}>
      <defs>
        <linearGradient id={`av-${who}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={grad[0]}/><stop offset="100%" stopColor={grad[1]}/>
        </linearGradient>
        <clipPath id={`clip-${who}`}><circle cx="32" cy="32" r="30"/></clipPath>
      </defs>
      <circle cx="32" cy="32" r="31" fill="#1C1610" stroke={`url(#av-${who})`} strokeWidth="1.6"/>
      <g clipPath={`url(#clip-${who})`}>
        {who==="kate"?(
          <>
            {/* hair */}
            <path d="M16 30c0-11 7-18 16-18s16 7 16 18c0 6-2 10-4 13 1-6 0-12-3-15-3 4-9 6-15 6-3 0-6-1-8-3-1 4-2 8-1 12-1-4-1-9-1-13z" fill={`url(#av-${who})`} opacity="0.92"/>
            {/* face */}
            <circle cx="32" cy="31" r="11" fill="#F0E6CC" opacity="0.95"/>
            {/* shoulders */}
            <path d="M14 64c0-11 8-18 18-18s18 7 18 18z" fill={`url(#av-${who})`} opacity="0.92"/>
          </>
        ):(
          <>
            {/* hair short */}
            <path d="M19 28c0-9 6-16 13-16s13 7 13 16c0 2-.3 4-1 6-1-5-2-9-5-11-2 2-5 3-9 3s-7-1-9-3c-1 3-1 7-2 11-.5-2-.0-4 0-6z" fill={`url(#av-${who})`} opacity="0.92"/>
            {/* face */}
            <circle cx="32" cy="31" r="11" fill="#F0E6CC" opacity="0.95"/>
            {/* shoulders + collar */}
            <path d="M13 64c0-12 9-19 19-19s19 7 19 19z" fill={`url(#av-${who})`} opacity="0.92"/>
            <path d="M32 47l-5 8 5 4 5-4z" fill="#1C1610" opacity="0.85"/>
          </>
        )}
      </g>
    </svg>
  );
}

// Velvet mark: gold V with a sparkle (AI hint)

  return(
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none" style={{display:"block"}}>
      <defs><linearGradient id="vm" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#C8A060"/><stop offset="100%" stopColor="#DDB87A"/></linearGradient></defs>
      <text x="19" y="29" textAnchor="middle" fontFamily="Palatino Linotype,Georgia,serif" fontSize="26" fontWeight="700" fill="url(#vm)">V</text>
      <g style={{transformOrigin:"31px 11px",animation:"sparkle 2.4s ease-in-out infinite"}}>
        <path d="M31 6l1.4 3.6L36 11l-3.6 1.4L31 16l-1.4-3.6L26 11l3.6-1.4z" fill="#EDD9A8"/>

const INIT=[];const INIT_RE=[];const INIT_STR=[];
function loadData(key,def){try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch{return def;}}
function saveData(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
const calcVal=r=>{if(r.fixedVal!==undefined)return r.fixedVal;const u=r.qty*r.price;return r.cur==="USD"?u/FX:u;};
const fe=(v,c=false)=>{const a=Math.abs(v),neg=v<0;let s;if(c){s=a>=1e6?`€${(a/1e6).toFixed(2)}M`:a>=1e3?`€${(a/1e3).toFixed(1)}K`:`€${a.toFixed(0)}`;}else{s=`€${a.toLocaleString("fr-CH",{minimumFractionDigits:2,maximumFractionDigits:2})}`;}return neg?`−${s}`:s;};
const fp=v=>{const s=v>=0?"+":"";return`${s}${v.toFixed(2)}%`;};
const fmtDate=()=>{const n=new Date();return`${n.getDate().toString().padStart(2,"0")}.${(n.getMonth()+1).toString().padStart(2,"0")}.${n.getFullYear()} ${n.getHours().toString().padStart(2,"0")}:${n.getMinutes().toString().padStart(2,"0")}`;};

function genHistory(cur,avg,days){
  const data=[];let p=avg*(1+(Math.random()-0.4)*0.15);
  const trend=(cur-p)/days;
  for(let i=0;i<days;i++){
    p=Math.max(p+trend+p*(Math.random()-0.48)*0.025,cur*0.05);
    const d=new Date();d.setDate(d.getDate()-(days-i));
    const lbl=days<=7?d.toLocaleDateString("en-GB",{weekday:"short"}):days<=31?d.toLocaleDateString("en-GB",{day:"numeric",month:"short"}):d.toLocaleDateString("en-GB",{month:"short",year:"2-digit"});
    data.push({lbl,price:parseFloat(p.toFixed(3))});
  }
  data[data.length-1].price=cur;return data;
}

function SVGChart({data,avgCost,color}){
  const W=300,H=110;
  const prices=data.map(d=>d.price);
  const mn=Math.min(...prices)*0.985,mx=Math.max(...prices)*1.015;
  const px=i=>(i/(data.length-1))*W;
  const py=p=>H-((p-mn)/(mx-mn))*H;
  const path=data.map((d,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(d.price).toFixed(1)}`).join(" ");
  const area=path+` L${W},${H} L0,${H} Z`;
  const avgY=avgCost>=mn&&avgCost<=mx?py(avgCost).toFixed(1):null;
  const lbls=[0,Math.floor(data.length/2),data.length-1];
  return(
    <svg viewBox={`0 0 ${W} ${H+16}`} style={{width:"100%",height:126,display:"block"}}>
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0.02"/></linearGradient></defs>
      <path d={area} fill="url(#ag)"/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {avgY&&<><line x1="0" y1={avgY} x2={W} y2={avgY} stroke={C.gold} strokeWidth="1" strokeDasharray="5,3" opacity="0.7"/>
        <text x={W-2} y={parseFloat(avgY)-3} fill={C.gold} fontSize="7" textAnchor="end" opacity="0.85">avg ${avgCost}</text></>}
      <circle cx={px(data.length-1)} cy={py(data[data.length-1].price)} r="3.5" fill={color}/>
      {lbls.map((i,k)=><text key={k} x={k===0?2:k===1?W/2:W-2} y={H+13} fill="#7A6E5E" fontSize="7" textAnchor={k===0?"start":k===1?"middle":"end"}>{data[i]&&data[i].lbl}</text>)}
    </svg>
  );
}

function PositionDrawer({row,onClose,portfolioContext,assistant}){
  const [tf,setTf]=useState("1M");
  const [chartData,setChartData]=useState(null);
  const [chartLoading,setChartLoading]=useState(false);
  const [aiQ,setAIQ]=useState("");
  const [aiAns,setAIAns]=useState("");
  const [aiLoading,setAILoading]=useState(false);
  const who=ASSISTANTS[assistant];

  const days=tf==="1W"?7:tf==="1M"?30:365;
  const color=row.price>=(row.avgCost||0)?C.green:C.red;
  const pnlPct=row.avgCost>0?((row.price-row.avgCost)/row.avgCost)*100:0;
  const pnlEur=row.qty>0?(row.price-row.avgCost)*row.qty/FX:0;

  const fetchChart=async(ticker,interval,outputsize)=>{
    if(!ticker)return;
    const cacheKey=`chart_${ticker}_${interval}_${outputsize}`;
    const cached=getCached(cacheKey);
    if(cached){setChartData(cached);return;}
    setChartLoading(true);
    try{
      const sym=ticker==="XAU"?"XAU/USD":ticker;
      // Charts use Twelve Data for real historical series (Finnhub free has no history)
      const res=await fetch(`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=${interval}&outputsize=${outputsize}&apikey=${TD_KEY}`);
      const d=await res.json();
      if(d.values&&d.values.length>0){
        const vals=[...d.values].reverse();
        const parsed=vals.map(v=>({lbl:v.datetime.slice(5,10),price:parseFloat(v.close)}));
        setCache(cacheKey,parsed);
        setChartData(parsed);
      } else {
        setChartData(null);
      }
    }catch(e){console.error(e);setChartData(null);}
    setChartLoading(false);
  };

  useEffect(()=>{
    const interval=tf==="1W"?"1h":tf==="1M"?"1day":"1week";
    const outputsize=tf==="1W"?48:tf==="1M"?30:52;
    if(row.ticker) fetchChart(row.ticker,interval,outputsize);
    else setChartData(null);
  },[tf,row.ticker]);

  const displayData=chartData||genHistory(row.price,row.avgCost||row.price,days);
  const tfChg=displayData.length>1?((displayData[displayData.length-1].price-displayData[0].price)/displayData[0].price)*100:0;

  const askAI=async()=>{
    if(!aiQ.trim()||aiLoading)return;
    setAILoading(true);
    setAIAns("");
    try{
      const res=await fetch("/api/chat.js",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens:600,
          system:`${who.persona} Réponds toujours dans la langue du client. Concis, 3 paragraphes max, sans emojis.
Position analysée: ${row.name} (${row.ticker||"—"}) | Prix: $${row.price} | Avg Cost: $${row.avgCost||"—"} | Qty: ${row.qty} | P&L: ${fp(pnlPct)} | Valeur: ${fe(calcVal(row),true)}
${portfolioContext}
Termine par — ${who.name}, Velvet Concierge`,
          messages:[{role:"user",content:aiQ}]
        })
      });
      const d=await res.json();
      const txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("")||"Service unavailable.";
      setAIAns(txt);
    }catch(e){setAIAns("Connection error.");}
    setAILoading(false);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300}} onClick={onClose}>
      <div style={{background:C.bg2,border:`1px solid ${C.borderHi}`,borderRadius:"18px 18px 0 0",padding:"16px 18px 32px",width:"100%",maxWidth:520,maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{width:36,height:4,borderRadius:2,background:C.gray,margin:"0 auto 14px",opacity:0.4}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.cream}}>{row.name}</div>
            <div style={{fontSize:9,color:C.gray,marginTop:2}}>{row.ticker&&`${row.ticker} · `}{row.isin||""} · {row.bank}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.gray,cursor:"pointer",fontSize:20,lineHeight:1}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          {[{l:"Price",v:`$${row.price}`,c:C.goldL},{l:"Avg Cost",v:`$${row.avgCost||"—"}`,c:C.grayL},{l:`Chg ${tf}`,v:fp(tfChg),c:tfChg>=0?C.green:C.red}].map((k,i)=>(
            <div key={i} style={{background:C.bg3,borderRadius:8,padding:"8px 10px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:8,color:C.gray,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>{k.l}</div>
              <div style={{fontSize:13,fontWeight:700,color:k.c}}>{k.v}</div>
            </div>
          ))}
        </div>
        {row.qty>0&&row.avgCost>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            <div style={{background:pnlPct>=0?"rgba(76,175,125,0.10)":"rgba(192,57,43,0.10)",borderRadius:8,padding:"10px 12px",border:`1px solid ${pnlPct>=0?"rgba(76,175,125,0.3)":"rgba(192,57,43,0.3)"}`}}>
              <div style={{fontSize:8,color:C.gray,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>P&L vs Avg Cost</div>
              <div style={{fontSize:18,fontWeight:700,color:pnlPct>=0?C.green:C.red}}>{fp(pnlPct)}</div>
            </div>
            <div style={{background:"rgba(200,160,96,0.07)",borderRadius:8,padding:"10px 12px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:8,color:C.gray,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>P&L EUR</div>
              <div style={{fontSize:18,fontWeight:700,color:pnlPct>=0?C.green:C.red}}>{(pnlEur>=0?"+":"")+fe(pnlEur,true)}</div>
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {["1W","1M","1Y"].map(t=>(
            <button key={t} onClick={()=>setTf(t)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${t===tf?C.gold:C.border}`,background:t===tf?`linear-gradient(135deg,${C.gold},${C.goldL})`:"transparent",color:t===tf?C.bg:C.grayL,fontSize:11,fontWeight:t===tf?700:400,cursor:"pointer"}}>{t}</button>
          ))}
        </div>
        <div style={{background:C.bg,borderRadius:10,padding:"12px 8px 4px",border:`1px solid ${C.border}`,marginBottom:12}}>
          {chartLoading?<div style={{height:126,display:"flex",alignItems:"center",justifyContent:"center",color:C.gray,fontSize:11}}>Loading chart…</div>:<SVGChart data={displayData} avgCost={row.avgCost||0} color={color}/>}
          <div style={{textAlign:"center",fontSize:8,color:C.gray,paddingBottom:4}}>{chartData?"Twelve Data · Live":"Illustrative · no history"} · Dashed = avg cost</div>
        </div>
        {row.qty>0&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:14}}>
            {[{l:"Qty",v:row.qty.toLocaleString()},{l:"Value EUR",v:fe(calcVal(row),true)},{l:`Lombard ${Math.round(LR[row.cat]*100)}%`,v:fe(Math.max(0,calcVal(row))*LR[row.cat],true)},{l:"Cost EUR",v:fe((row.avgCost||0)*row.qty/FX,true)},{l:"Category",v:CAT_L[row.cat]},{l:"Currency",v:row.cur}].map((k,i)=>(
              <div key={i} style={{background:C.bg3,borderRadius:7,padding:"7px 9px"}}>
                <div style={{fontSize:8,color:C.gray,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:2}}>{k.l}</div>
                <div style={{fontSize:10,color:C.cream,fontWeight:600}}>{k.v}</div>
              </div>
            ))}
          </div>
        )}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <Avatar who={assistant} size={26}/>
            <div style={{fontSize:9,color:C.gold,letterSpacing:"0.15em",textTransform:"uppercase",fontWeight:700}}>{who.name} · Position Analysis</div>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
            {["Should I hold?","Risks?","Price target?","Buy more?"].map(q=>(
              <button key={q} onClick={()=>setAIQ(q)} style={{background:"rgba(200,160,96,0.07)",border:`1px solid ${C.border}`,borderRadius:14,padding:"4px 9px",fontSize:9,color:C.goldL,cursor:"pointer"}}>{q}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <textarea style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.cream,fontSize:12,outline:"none",height:52}} placeholder={`Ask ${who.name} about this position…`} value={aiQ} onChange={e=>setAIQ(e.target.value)}/>
            <button onClick={askAI} disabled={aiLoading} style={{background:`linear-gradient(135deg,${C.gold},${C.goldL})`,color:C.bg,border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:aiLoading?"not-allowed":"pointer"}}>{aiLoading?"…":"→"}</button>
          </div>
          {(aiLoading||aiAns)&&(
            <div style={{marginTop:10,background:C.bg3,border:`1px solid rgba(200,160,96,0.12)`,borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:8,color:C.gold,letterSpacing:"0.12em",marginBottom:5,textTransform:"uppercase"}}>{who.name} · Velvet Concierge</div>
              {aiLoading?<div style={{color:C.gray,fontSize:11}}>Analysing…</div>:<div style={{fontSize:11,lineHeight:1.75,color:C.cream,whiteSpace:"pre-wrap"}}>{aiAns}</div>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Tag({cat}){
  const cols={xau:C.gold,large:C.blue,mid:"#8A6FBF",small:C.gray,bond:C.green,structured:"#C08040",realestate:"#40A0A0",cash:C.green,negative:C.red};
  return <span style={{background:`${cols[cat]||C.gray}20`,border:`1px solid ${cols[cat]||C.gray}45`,borderRadius:4,padding:"2px 6px",fontSize:9,color:cols[cat]||C.gray,letterSpacing:"0.04em",display:"inline-block",whiteSpace:"nowrap"}}>{CAT_L[cat]||cat}</span>;
}
function PctBar({pct,col=C.gold}){

function App(){
  const [showWelcome,setShowWelcome]=useState(()=>!localStorage.getItem("mfi_visited"));
  const [tab,setTab]=useState("dashboard");
  const [assistant,setAssistant]=useState(()=>localStorage.getItem("mfi_assistant")||null);
  const [rows,setRows]=useState(()=>loadData("mfi_rows",INIT).map(r=>({...r,value:calcVal(r)})));
  const [realestate,setRE]=useState(()=>loadData("mfi_re",INIT_RE));
  const [structured,setSTR]=useState(()=>loadData("mfi_str",INIT_STR));
  const [detail,setDetail]=useState(null);
  const [editRow,setEditRow]=useState(null);
  const [showAdd,setShowAdd]=useState(null);
  const [newItem,setNewItem]=useState({});
  const [priceLoading,setPL]=useState(false);
  const [liveCooldown,setLiveCooldown]=useState(0);
  const [lastUpdate,setLU]=useState(fmtDate());
  const [msgs,setMsgs]=useState([]);
  const [query,setQuery]=useState("");
  const [aiLoading,setAIL]=useState(false);
  const [simLTV,setSimLTV]=useState(70);
  const [simRate,setSimRate]=useState(1.2);
  const endRef=useRef(null);
  const cooldownRef=useRef(null);

  const enterApp=()=>{localStorage.setItem("mfi_visited","1");setShowWelcome(false);};
  if(showWelcome) return <LandingPage onEnter={enterApp}/>;

  const chooseAssistant=(w)=>{
    localStorage.setItem("mfi_assistant",w);
    setAssistant(w);
    setMsgs([{role:"assistant",text:greeting(w)}]);
  };

  const gross=rows.filter(r=>r.value>0).reduce((s,r)=>s+r.value,0);
  const net=rows.reduce((s,r)=>s+r.value,0);
  const lombF=rows.reduce((s,r)=>s+Math.max(0,r.value)*LR[r.cat],0);
  const reTotal=realestate.reduce((s,r)=>s+(r.currency==="USD"?r.value/FX:r.value),0);
  const reLomb=realestate.reduce((s,r)=>s+(r.currency==="USD"?r.value/FX:r.value)*r.lombard_pct,0);
  const strTotal=structured.reduce((s,r)=>s+(r.currency==="USD"?r.notional/FX:r.notional),0);
  const strLomb=strTotal*0.55;
  const totalA=gross+reTotal+strTotal;
  const totalL=lombF+reLomb+strLomb;
  const liquidity=totalL*0.85;
  const credit=totalL*(simLTV/100);
  const anCost=credit*(simRate/100);
  const totalPnL=rows.filter(r=>r.qty>0&&r.avgCost>0).reduce((s,r)=>s+(r.price-r.avgCost)*r.qty/FX,0);
  const totalCost=rows.filter(r=>r.qty>0&&r.avgCost>0).reduce((s,r)=>s+r.avgCost*r.qty/FX,0);
  const totalPnLPct=totalCost>0?(totalPnL/totalCost)*100:0;
  const portfolioContext=`Portfolio total: ${fe(totalA,true)} | Lombard: ${fe(totalL,true)} | P&L: ${fp(totalPnLPct)} | Positions: ${rows.map(r=>`${r.name} ${fe(r.value,true)}`).join(", ")}`;

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  useEffect(()=>{saveData("mfi_rows",rows);},[rows]);
  useEffect(()=>{saveData("mfi_re",realestate);},[realestate]);
  useEffect(()=>{saveData("mfi_str",structured);},[structured]);

  useEffect(()=>{
    if(liveCooldown>0){cooldownRef.current=setTimeout(()=>setLiveCooldown(v=>v-1),1000);}
    return()=>clearTimeout(cooldownRef.current);
  },[liveCooldown]);

  const refreshPrices=async()=>{
    if(priceLoading||liveCooldown>0)return;
    setPL(true);
    // Finnhub free has no commodities, so skip XAU (gold stays manual)
    const tickers=rows.filter(r=>r.ticker&&r.ticker!==""&&r.ticker!=="XAU").map(r=>r.ticker);
    if(!tickers.length){setPL(false);setLiveCooldown(120);return;}
    try{
      const newPrices={};
      // Query each ticker individually; server cache means this stays cheap
      await Promise.all(tickers.map(async t=>{
        try{
          const res=await fetch(`/api/prices.js?symbol=${encodeURIComponent(t)}`);
          const d=await res.json();
          const px=d.price!==undefined?d.price:(d.values&&d.values[0]?parseFloat(d.values[0].close):null);
          if(px!==null&&!isNaN(px)&&px>0) newPrices[t]=px;
        }catch(e){console.error("price",t,e);}
      }));
      if(Object.keys(newPrices).length>0){
        setRows(prev=>prev.map(r=>{
          if(!r.ticker||newPrices[r.ticker]===undefined)return r;
          const np=newPrices[r.ticker];
          return{...r,price:np,value:calcVal({...r,price:np})};
        }));
        setLU(fmtDate());
      }
    }catch(e){console.error("Price fetch error",e);}
    setPL(false);
    setLiveCooldown(120);
  };

  const sendAI=async()=>{
    if(!query.trim()||aiLoading)return;
    const who=ASSISTANTS[assistant];
    const q=query.trim();setQuery("");setMsgs(m=>[...m,{role:"user",text:q}]);setAIL(true);
    const ps=rows.map(r=>`${r.name}(${r.cat},L${Math.round(LR[r.cat]*100)}%):${fe(r.value,true)}${r.ticker?`@$${r.price}avg$${r.avgCost}qty${r.qty}`:""}`).join(";");
    try{
      const res=await fetch("/api/chat.js",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,
          system:`${who.persona} Réponds toujours dans la langue du client — si le client écrit en russe, réponds en russe; si en anglais, réponds en anglais; si en français, réponds en français. Concis, 4 paragraphes max, sans emojis.
Portfolio: ${ps}
Real Assets (Heritage): ${fe(reTotal,true)} | Structured: ${fe(strTotal,true)}
Assets: ${fe(totalA,true)} | Lombard: ${fe(totalL,true)} | Liquidity: ${fe(liquidity,true)} | P&L: ${fp(totalPnLPct)}
FX: 1USD=${(1/FX).toFixed(4)}EUR | Date: ${lastUpdate}
Termine toujours par — ${who.name}, Velvet Concierge`,
          messages:[...msgs.slice(-8).map(m=>({role:m.role,content:m.text})),{role:"user",content:q}]})
      });
      const d=await res.json();
      const txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("")||"Service unavailable.";
      setMsgs(m=>[...m,{role:"assistant",text:txt}]);
    }catch(e){
      setMsgs(m=>[...m,{role:"assistant",text:`Connection error.\n— ${ASSISTANTS[assistant].name}`}]);
    }
    setAIL(false);
  };

  const card={background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"};
  const sec={fontSize:9,color:C.gold,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:10,fontWeight:700};

  const liveDisabled=priceLoading||liveCooldown>0;
  const liveLabel=priceLoading?"⟳ …":liveCooldown>0?`⟳ ${liveCooldown}s`:"⟳ Live";

  return(
    <div className="mfi-app" style={{minHeight:"100vh",background:C.bg,color:C.cream,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.bg1,borderBottom:`1px solid ${C.border}`,padding:"10px 15px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${C.gold},${C.goldL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:C.bg,flexShrink:0,boxShadow:`0 3px 12px rgba(200,160,60,0.3)`}}>MFI</div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:C.gold,letterSpacing:"0.12em",textTransform:"uppercase"}}>Monaco Finance</div>
              <div style={{fontSize:8,color:C.gray,letterSpacing:"0.1em"}}>International · {lastUpdate}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={refreshPrices} disabled={liveDisabled} style={{background:"rgba(200,160,96,0.08)",border:`1px solid ${C.borderHi}`,borderRadius:7,padding:"5px 10px",color:liveDisabled?C.gray:C.goldL,fontSize:9,cursor:liveDisabled?"not-allowed":"pointer",letterSpacing:"0.05em"}}>
              {liveLabel}

              {t.id==="ai"&&<span style={{position:"relative",display:"inline-flex",alignItems:"center",marginRight:2}}><span style={{fontSize:13,fontWeight:700}}>V</span><span style={{position:"absolute",top:-5,right:-6,fontSize:8,color:tab===t.id?C.bg:C.goldP,animation:"sparkle 2.4s ease-in-out infinite"}}>✦</span></span>}{t.l}
            </button>

        </nav>
      </div>

      <div style={{flex:1,padding:"13px 15px",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {tab==="dashboard"&&(

          </div>
          <select style={INP} value={newItem.cur||"USD"} onChange={e=>setNewItem(p=>({...p,cur:e.target.value}))}>
            {CURS.map(c=><option key={c}>{c}</option>)}
          </select>
          <select style={INP} value={newItem.bank||"Moncrief Bank"} onChange={e=>setNewItem(p=>({...p,bank:e.target.value}))}>
            {BANKS.map(b=><option key={b}>{b}</option>)}
          </select>
          <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:4}}>
            <button style={{background:"transparent",color:C.gray,border:`1px solid ${C.gray}`,borderRadius:8,padding:"7px 14px",fontSize:11,cursor:"pointer"}} onClick={()=>setShowAdd(null)}>Cancel</button>
            <button style={GBTN} onClick={()=>{
              if(!newItem.name||!newItem.qty||!newItem.price)return;
              const qty=parseFloat(newItem.qty),price=parseFloat(newItem.price),avg=parseFloat(newItem.avgCost)||0;
              const val=newItem.cur==="USD"?qty*price/FX:qty*price;
              setRows(p=>[...p,{id:Date.now(),...newItem,qty,price,avgCost:avg,value:val,isin:newItem.isin||""}]);
              setShowAdd(null);
            }}>Add</button>
          </div>
        </Modal>
      )}

      {showAdd==="realestate"&&(
        <Modal title="Add Heritage Asset" onClose={()=>setShowAdd(null)}>
          {[{ph:"Asset name (Villa, Yacht, Aircraft, Art…)",key:"name"},{ph:"Location",key:"location"},{ph:"Market value",key:"value",t:"number"},{ph:"Ownership entity",key:"ownership"},{ph:"Notes",key:"notes"}].map(f=>(
            <input key={f.key} style={INP} placeholder={f.ph} type={f.t||"text"} value={newItem[f.key]||""} onChange={e=>setNewItem(p=>({...p,[f.key]:e.target.value}))}/>
          ))}
          <select style={INP} value={newItem.currency||"EUR"} onChange={e=>setNewItem(p=>({...p,currency:e.target.value}))}>
            {CURS.map(c=><option key={c}>{c}</option>)}
          </select>
          <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:4}}>
            <button style={{background:"transparent",color:C.gray,border:`1px solid ${C.gray}`,borderRadius:8,padding:"7px 14px",fontSize:11,cursor:"pointer"}} onClick={()=>setShowAdd(null)}>Cancel</button>
            <button style={GBTN} onClick={()=>{
              if(!newItem.name||!newItem.value)return;
              setRE(p=>[...p,{id:Date.now(),...newItem,value:parseFloat(newItem.value),lombard_pct:0.60,status:"Active"}]);
              setShowAdd(null);
            }}>Add</button>
          </div>
        </Modal>
      )}

      {showAdd==="structured"&&(
        <Modal title="Add Structured Product" onClose={()=>setShowAdd(null)}>
          {[{ph:"Product name",key:"name"},{ph:"ISIN",key:"isin"},{ph:"Issuer",key:"issuer"},{ph:"Underlyings (NVDA/TSLA)",key:"underlyings"},{ph:"Maturity (YYYY-MM-DD)",key:"maturity"},{ph:"Notional amount",key:"notional",t:"number"}].map(f=>(
            <input key={f.key} style={INP} placeholder={f.ph} type={f.t||"text"} value={newItem[f.key]||""} onChange={e=>setNewItem(p=>({...p,[f.key]:e.target.value}))}/>
          ))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <input style={INP} placeholder="Barrier %" type="number" value={newItem.barrier||""} onChange={e=>setNewItem(p=>({...p,barrier:parseFloat(e.target.value)}))}/>
            <input style={INP} placeholder="Coupon %" type="number" value={newItem.coupon||""} onChange={e=>setNewItem(p=>({...p,coupon:parseFloat(e.target.value)}))}/>
          </div>
          <select style={INP} value={newItem.currency||"EUR"} onChange={e=>setNewItem(p=>({...p,currency:e.target.value}))}>
            {CURS.map(c=><option key={c}>{c}</option>)}
          </select>
          <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:4}}>
            <button style={{background:"transparent",color:C.gray,border:`1px solid ${C.gray}`,borderRadius:8,padding:"7px 14px",fontSize:11,cursor:"pointer"}} onClick={()=>setShowAdd(null)}>Cancel</button>
            <button style={GBTN} onClick={()=>{
              if(!newItem.name||!newItem.notional)return;
              setSTR(p=>[...p,{id:Date.now(),...newItem,notional:parseFloat(newItem.notional),status:"Active"}]);
              setShowAdd(null);
            }}>Add</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function greeting(w){
  const n=ASSISTANTS[w].name;
  return `Welcome. I'm ${n} — your personal concierge at Velvet, Monaco Finance International.\n\nI have real-time visibility of your full portfolio, heritage assets and Lombard limits — and I'm here for anything, from a stock price to the cost of fuel in Monaco.\n\nAsk me about strategy, a specific position, credit scenarios, or daily life on the Riviera.\n\n— ${n}, Velvet Concierge`;
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
